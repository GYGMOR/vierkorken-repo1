name: Build and Deploy (web01)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: vars
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.IMAGE }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Guard - ensure DEPLOY_HOST is set
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ERROR: DEPLOY_HOST secret is missing/empty."
            exit 1
          fi

      - name: Deploy on web01 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE='${{ needs.build_and_push.outputs.image }}'
            echo "Deploying image: $IMAGE"

            # Login to GHCR on the server (required for private packages; safe for public too)
            echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin

            docker pull "$IMAGE"

            docker stop app || true
            docker rm app || true

            docker run -d \
              --name app \
              --restart unless-stopped \
              --network web \
              -e NODE_ENV=production \
              -e PORT=3000 \
              "$IMAGE"

            docker image prune -f
            docker ps --filter "name=app"
